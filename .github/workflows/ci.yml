name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build tamazia-electron
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run build (prod)
        run: npm run build:prod

      - name: Archive build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tamazia-electron-out
          path: tamazia-electron/out/**
