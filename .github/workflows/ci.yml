name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tamazia-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tamazia-electron/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
