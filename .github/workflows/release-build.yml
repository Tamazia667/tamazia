name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    name: Package release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Package platform build
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then npm run package:linux; fi
          if [ "${{ matrix.os }}" = "macos-latest" ]; then npm run package:mac; fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then npm run package:win; fi
        shell: bash

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: out/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
