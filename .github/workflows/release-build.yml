name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package platform build
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then npm run package:linux; fi
          if [ "${{ matrix.os }}" = "macos-latest" ]; then npm run package:mac; fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then npm run package:win; fi
        shell: bash

      - name: Archive build artifact
        if: matrix.os != 'windows-latest'
        run: |
          PLATFORM=linux
          if [ "${{ matrix.os }}" = "macos-latest" ]; then PLATFORM=macos; fi
          zip -r "Tamazia-${PLATFORM}-x64.zip" out
        shell: bash

      - name: Archive build artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path out\* -DestinationPath Tamazia-windows-x64.zip -Force
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: Tamazia-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
